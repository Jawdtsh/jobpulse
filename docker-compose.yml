services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobpulse_postgres
    environment:
      POSTGRES_USER: jobpulse
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobpulse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobpulse -d jobpulse_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: jobpulse_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  taskiq-worker:
    build: .
    container_name: jobpulse_taskiq_worker
    command: taskiq worker workers.taskiq_app:broker --fs-discover
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  taskiq-scheduler:
    build: .
    container_name: jobpulse_taskiq_scheduler
    command: taskiq scheduler workers.taskiq_app:scheduler --fs-discover
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: